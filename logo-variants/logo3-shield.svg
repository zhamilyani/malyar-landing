<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Вариант 3: Щит/ромб + текст (надёжность) -->
  <rect width="400" height="100" fill="#111"/>
  <!-- Ромб -->
  <polygon points="40,10 65,50 40,90 15,50" fill="none" stroke="#c9a84c" stroke-width="2.5"/>
  <text x="40" y="57" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#c9a84c" text-anchor="middle">M</text>
  <!-- Текст -->
  <text x="85" y="45" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#e8e8e8" letter-spacing="2">MALYARKAPRO</text>
  <text x="355" y="45" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#c9a84c" letter-spacing="2">.KZ</text>
  <!-- Линия -->
  <line x1="85" y1="55" x2="380" y2="55" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <!-- Подпись -->
  <text x="85" y="72" font-family="Arial, sans-serif" font-size="11" fill="#999" letter-spacing="4">ПОКРАСКА ФАСАДОВ В АЛМАТЫ</text>
</svg>
