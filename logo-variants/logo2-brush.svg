<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Вариант 2: Кисть + мазок -->
  <rect width="400" height="100" fill="#111"/>
  <!-- Мазок краски -->
  <path d="M20,55 Q40,35 70,45 T120,40" stroke="#c9a84c" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Кисть -->
  <rect x="15" y="38" width="20" height="28" rx="2" fill="#c9a84c"/>
  <rect x="18" y="30" width="14" height="10" rx="1" fill="#666"/>
  <rect x="22" y="20" width="6" height="12" rx="1" fill="#888"/>
  <!-- Текст -->
  <text x="85" y="48" font-family="'Georgia', serif" font-size="34" font-weight="700" fill="#e8e8e8">malyarka</text>
  <text x="300" y="48" font-family="'Georgia', serif" font-size="34" font-weight="700" fill="#c9a84c">pro.kz</text>
  <!-- Подпись -->
  <text x="85" y="70" font-family="Arial, sans-serif" font-size="11" fill="#999" letter-spacing="3">ПОКРАСОЧНЫЙ ЦЕХ • АЛМАТЫ</text>
</svg>
